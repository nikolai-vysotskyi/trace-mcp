appId: com.trace-mcp.app
productName: trace-mcp
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
  - assets/**
  - build/icon.png
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: zip

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

linux:
  target: []
