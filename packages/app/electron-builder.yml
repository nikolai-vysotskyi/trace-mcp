appId: com.trace-mcp.app
productName: trace-mcp
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
  - assets/**
  - build/icon.png
extraResources:
  - from: ../../scripts/apply-pending-update.mjs
    to: scripts/apply-pending-update.mjs
  # locate-app.mjs is imported by apply-pending-update.mjs at runtime, so it
  # must ship alongside it inside the bundle's Resources/scripts/.
  - from: ../../scripts/locate-app.mjs
    to: scripts/locate-app.mjs
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: zip

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

linux:
  target: []
