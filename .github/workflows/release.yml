name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'Force-publish this existing git tag (e.g. v1.38.0) when the normal release-please flow already created the tag but the publish job failed.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append upgrade instructions to release notes
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          BODY=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body')
          FOOTER=$(cat <<'UPGRADE'

          ---

          ### Upgrade

          ```bash
          npm install -g trace-mcp@latest
          trace-mcp init
          ```
          UPGRADE
          )
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes "${BODY}${FOOTER}"

  # GITHUB_TOKEN actions don't trigger pull_request events, so the CI
  # impact-report never fires for release-please PRs.  Run it here instead.
  impact-report:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    env:
      # Mirror CI workflow env so our own postinstall scripts opt out and the
      # auto-update is disabled during the install.
      TRACE_MCP_NO_POSTINSTALL: '1'
      TRACE_MCP_NO_AUTO_UPDATE: '1'
      CI: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Same exclusions as .github/workflows/ci.yml :: test step. Without
      # them the suite hangs on the Linux CI runner (root cause documented
      # in the CI workflow — toon-drift, debounce-abort).
      - run: pnpm exec vitest run --exclude='tests/perf/**' --exclude='tests/fixtures/**' --exclude='tests/languages/test_xml.test.ts' --exclude='tests/integration/**' --exclude='tests/daemon/**' --exclude='src/telemetry/__tests__/**' --exclude='src/tools/register/__tests__/toon-drift.test.ts' --exclude='tests/util/debounce-abort.test.ts' --testTimeout=30000 --hookTimeout=15000 --teardownTimeout=15000

      - name: Index project
        run: node dist/cli.js index . --force

      - name: Find release-please PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr list --search "head:release-please--branches--master" --json number --limit 1 --jq '.[0] // empty')
          if [ -n "$PR_JSON" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            # Compare against the latest release tag, not merge-base
            # (we're on master, so merge-base with master is HEAD itself)
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "base=$LAST_TAG" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate impact report
        if: steps.pr.outputs.number != ''
        run: |
          node dist/cli.js ci-report \
            --base ${{ steps.pr.outputs.base }} \
            --head ${{ steps.pr.outputs.head }} \
            --format markdown \
            --output report.md

      - name: Post PR comment
        if: steps.pr.outputs.number != '' && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          number: ${{ steps.pr.outputs.number }}
          path: report.md

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event.inputs.publish_tag != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      TSUP_TARGET: node22
      TRACE_MCP_NO_POSTINSTALL: '1'
      TRACE_MCP_NO_AUTO_UPDATE: '1'
      CI: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Dispatch override > release-please's freshly cut tag.
          ref: ${{ github.event.inputs.publish_tag != '' && github.event.inputs.publish_tag || needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Same exclusions as ci.yml :: test step (hang in toon-drift etc).
      - run: pnpm exec vitest run --exclude='tests/perf/**' --exclude='tests/fixtures/**' --exclude='tests/languages/test_xml.test.ts' --exclude='tests/integration/**' --exclude='tests/daemon/**' --exclude='src/telemetry/__tests__/**' --exclude='src/tools/register/__tests__/toon-drift.test.ts' --exclude='tests/util/debounce-abort.test.ts' --testTimeout=30000 --hookTimeout=15000 --teardownTimeout=15000
      # pnpm 10's `--provenance` flow signs the sigstore attestation
      # successfully but the subsequent `PUT /trace-mcp` to the npm
      # registry returns 404 — the OIDC-token-to-npm-scoped-token swap
      # for trusted publishers isn't implemented compatibly. v1.33.0 was
      # published cleanly with the npm-CLI workaround below; v1.34.0 and
      # v1.34.1 both failed under pnpm publish (runs 25635344085 and
      # 25635744167). Stay on `npx -y npm@11 publish` until pnpm fixes
      # the trusted-publisher exchange.
      - run: npx -y npm@11 publish --provenance --access public
