name: Release

on:
  push:
    branches: [master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # GITHUB_TOKEN actions don't trigger pull_request events, so the CI
  # impact-report never fires for release-please PRs.  Run it here instead.
  impact-report:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Index project
        run: node dist/cli.js index . --force

      - name: Find release-please PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr list --head "release-please--branches--master" --json number,baseRefName --limit 1 --jq '.[0] // empty')
          if [ -n "$PR_JSON" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            BASE_BRANCH=$(echo "$PR_JSON" | jq -r '.baseRefName')
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "base=$(git merge-base origin/$BASE_BRANCH HEAD)" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate impact report
        if: steps.pr.outputs.number != ''
        run: |
          node dist/cli.js ci-report \
            --base ${{ steps.pr.outputs.base }} \
            --head ${{ steps.pr.outputs.head }} \
            --format markdown \
            --output report.md

      - name: Post PR comment
        if: steps.pr.outputs.number != '' && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.number }}
          path: report.md

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
