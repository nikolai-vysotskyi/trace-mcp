name: Release

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append upgrade instructions to release notes
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          BODY=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body')
          FOOTER=$(cat <<'UPGRADE'

          ---

          ### Upgrade

          ```bash
          npm install -g trace-mcp@latest
          trace-mcp init
          ```
          UPGRADE
          )
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes "${BODY}${FOOTER}"

  # GITHUB_TOKEN actions don't trigger pull_request events, so the CI
  # impact-report never fires for release-please PRs.  Run it here instead.
  impact-report:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

      - name: Index project
        run: node dist/cli.js index . --force

      - name: Find release-please PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr list --search "head:release-please--branches--master" --json number --limit 1 --jq '.[0] // empty')
          if [ -n "$PR_JSON" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            # Compare against the latest release tag, not merge-base
            # (we're on master, so merge-base with master is HEAD itself)
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "base=$LAST_TAG" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate impact report
        if: steps.pr.outputs.number != ''
        run: |
          node dist/cli.js ci-report \
            --base ${{ steps.pr.outputs.base }} \
            --head ${{ steps.pr.outputs.head }} \
            --format markdown \
            --output report.md

      - name: Post PR comment
        if: steps.pr.outputs.number != '' && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          number: ${{ steps.pr.outputs.number }}
          path: report.md

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      TSUP_TARGET: node22
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
      # pnpm 10's `--provenance` flow signs the sigstore attestation
      # successfully but the subsequent `PUT /trace-mcp` to the npm
      # registry returns 404 — the OIDC-token-to-npm-scoped-token swap
      # for trusted publishers isn't implemented compatibly. v1.33.0 was
      # published cleanly with the npm-CLI workaround below; v1.34.0 and
      # v1.34.1 both failed under pnpm publish (runs 25635344085 and
      # 25635744167). Stay on `npx -y npm@11 publish` until pnpm fixes
      # the trusted-publisher exchange.
      - run: npx -y npm@11 publish --provenance --access public

  build-app-mac:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install root dependencies and build server
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install app dependencies
        working-directory: packages/app
        run: pnpm install --frozen-lockfile

      - name: Build app
        working-directory: packages/app
        run: pnpm run build

      - name: Sync app version from root package.json
        working-directory: packages/app
        run: |
          ROOT_VERSION=$(node -p "require('../../package.json').version")
          npm pkg set version="$ROOT_VERSION"

      - name: Package with electron-builder
        working-directory: packages/app
        env:
          ARCH: ${{ matrix.arch }}
        run: pnpm exec electron-builder --mac --${{ matrix.arch }} --publish never

      # Per-asset .sha256 files only (no combined manifest) because matrix
      # jobs run in parallel and would clobber each other's SHASUMS256.txt.
      - name: Generate SHA-256 per-asset checksums
        run: node scripts/generate-shasums.mjs packages/app/release .zip

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'packages/app/release/*.zip'

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            packages/app/release/*.zip \
            packages/app/release/*.zip.sha256 \
            --clobber

  build-app-win:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install root dependencies and build server
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install app dependencies
        working-directory: packages/app
        run: pnpm install --frozen-lockfile

      - name: Generate icons (including .ico for Windows)
        working-directory: packages/app
        run: node scripts/generate-icons.mjs

      - name: Build app
        working-directory: packages/app
        run: pnpm run build

      - name: Sync app version from root package.json
        working-directory: packages/app
        shell: bash
        run: |
          ROOT_VERSION=$(node -p "require('../../package.json').version")
          npm pkg set version="$ROOT_VERSION"

      - name: Package with electron-builder
        working-directory: packages/app
        run: pnpm exec electron-builder --win --x64 --publish never

      - name: Generate SHA-256 checksums
        shell: bash
        run: node scripts/generate-shasums.mjs packages/app/release .exe .zip

      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            packages/app/release/*.exe
            packages/app/release/*-win*.zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          FILES=(packages/app/release/*.exe packages/app/release/*-win*.zip)
          SUMS=(packages/app/release/*.exe.sha256 packages/app/release/*-win*.zip.sha256)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No artifacts found to upload"
            exit 1
          fi
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${FILES[@]}" \
            "${SUMS[@]}" \
            --clobber
