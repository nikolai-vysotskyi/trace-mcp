name: Release

on:
  push:
    branches: [master]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append upgrade instructions to release notes
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          BODY=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body')
          FOOTER=$(cat <<'UPGRADE'

          ---

          ### Upgrade

          ```bash
          npm install -g trace-mcp@latest
          trace-mcp init
          ```
          UPGRADE
          )
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes "${BODY}${FOOTER}"

  # GITHUB_TOKEN actions don't trigger pull_request events, so the CI
  # impact-report never fires for release-please PRs.  Run it here instead.
  impact-report:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Index project
        run: node dist/cli.js index . --force

      - name: Find release-please PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh pr list --search "head:release-please--branches--master" --json number --limit 1 --jq '.[0] // empty')
          if [ -n "$PR_JSON" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
            # Compare against the latest release tag, not merge-base
            # (we're on master, so merge-base with master is HEAD itself)
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "base=$LAST_TAG" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate impact report
        if: steps.pr.outputs.number != ''
        run: |
          node dist/cli.js ci-report \
            --base ${{ steps.pr.outputs.base }} \
            --head ${{ steps.pr.outputs.head }} \
            --format markdown \
            --output report.md

      - name: Post PR comment
        if: steps.pr.outputs.number != '' && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.number }}
          path: report.md

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      TSUP_TARGET: node22
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npx -y npm@11 publish --provenance --access public

  build-app-mac:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies and build server
        run: |
          npm ci
          npm run build

      - name: Install app dependencies
        working-directory: packages/app
        run: npm ci

      - name: Build app
        working-directory: packages/app
        run: npm run build

      - name: Sync app version from root package.json
        working-directory: packages/app
        run: |
          ROOT_VERSION=$(node -p "require('../../package.json').version")
          npm pkg set version="$ROOT_VERSION"

      - name: Package with electron-builder
        working-directory: packages/app
        env:
          ARCH: ${{ matrix.arch }}
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            packages/app/release/*.zip \
            --clobber

  build-app-win:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies and build server
        run: |
          npm ci
          npm run build

      - name: Install app dependencies
        working-directory: packages/app
        run: npm ci

      - name: Generate icons (including .ico for Windows)
        working-directory: packages/app
        run: node scripts/generate-icons.mjs

      - name: Build app
        working-directory: packages/app
        run: npm run build

      - name: Sync app version from root package.json
        working-directory: packages/app
        shell: bash
        run: |
          ROOT_VERSION=$(node -p "require('../../package.json').version")
          npm pkg set version="$ROOT_VERSION"

      - name: Package with electron-builder
        working-directory: packages/app
        run: npx electron-builder --win --x64 --publish never

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob
          FILES=(packages/app/release/*.exe packages/app/release/*-win*.zip)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No artifacts found to upload"
            exit 1
          fi
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${FILES[@]}" \
            --clobber
