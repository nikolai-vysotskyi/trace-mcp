name: Release

on:
  push:
    branches:
      - master

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger CI on release PR branch
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PRS_OUTPUT: ${{ steps.release.outputs.prs }}
        run: |
          PR_BRANCH=$(echo "$PRS_OUTPUT" | jq -r '.[0].headBranchName // empty')
          if [ -n "$PR_BRANCH" ]; then
            echo "Triggering CI on branch: $PR_BRANCH"
            gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$PR_BRANCH"
          fi

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test

      - run: npm publish --provenance --access public
