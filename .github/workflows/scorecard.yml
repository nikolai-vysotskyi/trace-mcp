name: OSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "31 3 * * 1"
  push:
    branches: [master]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        # ponytail: tolerate transient publish flakes, don't mask real failures.
        # publish_results uploads the public OpenSSF score to
        # api.securityscorecards.dev, which intermittently times out
        # ("context deadline exceeded") and fails this whole required check
        # (e.g. run 27633150872). The SARIF is written before that upload, so
        # code-scanning + the README badge still work; continue-on-error swallows
        # only the flaky publish — a genuine analysis failure produces no SARIF
        # and still reddens the upload-sarif step below.
        continue-on-error: true
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
