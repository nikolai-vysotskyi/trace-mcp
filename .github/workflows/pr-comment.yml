name: PR Comment

# Posts the impact-report comment produced by the CI workflow.  Runs in the
# context of the base repository, so GITHUB_TOKEN has pull-requests:write
# even for PRs from forks or from dependabot — which is why this lives in a
# separate workflow_run-triggered file rather than inside ci.yml.
#
# Security: this workflow does NOT check out, build, or execute any code from
# the PR.  It only downloads a sanitized artifact (report.md + pr-number.txt)
# produced by the CI run, validates the PR number is a positive integer, and
# posts the report as a sticky comment.

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  contents: read

jobs:
  post-comment:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - name: Download impact report artifact
        id: download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: impact-report
          path: artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Validate PR number
        if: steps.download.outcome == 'success'
        id: pr
        run: |
          if [ ! -s artifact/pr-number.txt ] || [ ! -s artifact/report.md ]; then
            echo "Artifact missing expected files"
            exit 0
          fi
          RAW=$(tr -d '[:space:]' < artifact/pr-number.txt)
          if ! [[ "$RAW" =~ ^[1-9][0-9]{0,9}$ ]]; then
            echo "Invalid PR number in artifact: $RAW"
            exit 0
          fi
          echo "number=$RAW" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          number: ${{ steps.pr.outputs.number }}
          path: artifact/report.md
