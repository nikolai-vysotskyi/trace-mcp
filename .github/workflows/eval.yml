name: Eval

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline-check:
    name: Retrieval-quality baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # The eval harness queries trace-mcp's `search` against the host
      # project's index — we need an index on disk before `eval run` can
      # do anything useful. `index` requires the project to be registered
      # first; `add --no-index` registers without doing a (slower) full
      # indexing pass, since the next step does that explicitly with --force.
      - name: Register project
        run: node dist/cli.js add . --no-index

      - name: Index project
        run: node dist/cli.js index . --force

      - name: Run eval with baseline check
        run: node dist/cli.js eval run --dataset default --check-baseline
