name: Eval

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline-check:
    name: Retrieval-quality baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # The eval harness queries trace-mcp's `search` against the host
      # project's index — we need an index on disk before `eval run` can
      # do anything useful.
      - name: Index project
        run: node dist/cli.js index . --force

      - name: Run eval with baseline check
        run: node dist/cli.js eval run --dataset default --check-baseline
