name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  impact-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Index project
        run: node dist/cli.js index . --force

      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            PR_JSON=$(gh pr list --head "${{ github.ref_name }}" --json number,baseRefName --limit 1 --jq '.[0] // empty')
            if [ -n "$PR_JSON" ]; then
              PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
              BASE_BRANCH=$(echo "$PR_JSON" | jq -r '.baseRefName')
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "base=$(git merge-base origin/$BASE_BRANCH HEAD)" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            else
              echo "number=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate impact report
        if: steps.pr.outputs.number != ''
        run: |
          node dist/cli.js ci-report \
            --base ${{ steps.pr.outputs.base }} \
            --head ${{ steps.pr.outputs.head }} \
            --format markdown \
            --output report.md

      - name: Post PR comment
        if: steps.pr.outputs.number != '' && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr.outputs.number }}
          path: report.md
