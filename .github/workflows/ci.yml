name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  biome:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install (skip postinstall scripts; Biome native still installs via optionalDependencies)
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Biome check (formatter + linter, errors only)
        run: npx biome ci --diagnostic-level=error

  impact-report:
    needs: biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Index project
        run: node dist/cli.js index . --force

      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            PR_JSON=$(gh pr list --head "${{ github.ref_name }}" --json number,baseRefName --limit 1 --jq '.[0] // empty')
            if [ -n "$PR_JSON" ]; then
              PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
              BASE_BRANCH=$(echo "$PR_JSON" | jq -r '.baseRefName')
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
              echo "base=$(git merge-base origin/$BASE_BRANCH HEAD)" >> "$GITHUB_OUTPUT"
              echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            else
              echo "number=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate impact report
        if: steps.pr.outputs.number != ''
        run: |
          node dist/cli.js ci-report \
            --base ${{ steps.pr.outputs.base }} \
            --head ${{ steps.pr.outputs.head }} \
            --format markdown \
            --output report.md

      - name: Post PR comment
        if: steps.pr.outputs.number != '' && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          number: ${{ steps.pr.outputs.number }}
          path: report.md

  app-typecheck:
    needs: biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/app/package-lock.json

      - name: Install app dependencies
        working-directory: packages/app
        run: npm ci

      - name: Typecheck
        working-directory: packages/app
        run: npm run typecheck

      - name: Build (renderer + main)
        working-directory: packages/app
        run: npm run build
